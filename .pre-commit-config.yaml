repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^flowstate/skills/
      - id: end-of-file-fixer
        exclude: ^flowstate/skills/
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: flowstate-pack
        name: refresh repomix pack (staleness-gated, non-blocking)
        # flowstate pack self-skips when the pack is current (mtime check) and only
        # repacks stale packs. Wrapped in `|| true` so a missing repomix never blocks
        # a commit — the pack is a best-effort cache, not a commit gate. The artifact
        # is untracked, so a refresh does not dirty the commit.
        entry: bash -c '.venv/bin/flowstate pack || true'
        language: system
        files: \.py$
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-cov
        name: pytest with coverage (80% min)
        entry: .venv/bin/python -m pytest tests/ --cov=flowstate --cov-fail-under=80 --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
