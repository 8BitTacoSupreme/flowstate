    "hook": {
      "on-activate": "  # All installs go into Flox cache — nothing pollutes the system.\n  NODE_PREFIX=\"$FLOX_ENV_CACHE/node-global\"\n  mkdir -p \"$NODE_PREFIX\"\n  export NPM_CONFIG_PREFIX=\"$NODE_PREFIX\"\n  MCP_BINS=\"$NODE_PREFIX/bin\"\n\n  # ── Claude Code CLI ──\n  if [ ! -x \"$MCP_BINS/claude\" ] && ! command -v claude &>/dev/null; then\n    echo \"⚡ Installing Claude Code CLI...\"\n    npm install -g @anthropic-ai/claude-code 2>/dev/null || \\\n      echo \"⚠  Claude Code install failed — set FLOWSTATE_CLAUDE_BIN manually\"\n  fi\n\n  # ── MCP servers ──\n  if [ ! -x \"$MCP_BINS/context7-mcp\" ]; then\n    echo \"⚡ Installing Context7 MCP server...\"\n    npm install -g @upstash/context7-mcp 2>/dev/null || true\n  fi\n\n  if [ ! -x \"$MCP_BINS/exa-mcp-server\" ]; then\n    echo \"⚡ Installing Exa MCP server...\"\n    npm install -g exa-mcp-server 2>/dev/null || true\n  fi\n\n  # ── Python venv + FlowState ──\n  if [ ! -d \"$FLOX_ENV_PROJECT/.venv\" ]; then\n    echo \"⚡ Creating Python venv...\"\n    python3 -m venv \"$FLOX_ENV_PROJECT/.venv\"\n  fi\n\n  if ! \"$FLOX_ENV_PROJECT/.venv/bin/python\" -c \"import flowstate\" 2>/dev/null; then\n    echo \"⚡ Installing FlowState...\"\n    \"$FLOX_ENV_PROJECT/.venv/bin/pip\" install -q -e \"$FLOX_ENV_PROJECT\"\n  fi\n\n  # ── Project-level MCP config for Claude Code ──\n  SETTINGS=\"$FLOX_ENV_PROJECT/.claude/settings.json\"\n  mkdir -p \"$(dirname \"$SETTINGS\")\"\n\n  if [ ! -f \"$SETTINGS\" ] || ! jq -e '.mcpServers.context7' \"$SETTINGS\" &>/dev/null; then\n    echo \"⚡ Configuring MCP servers for Claude Code...\"\n    EXISTING=\"{}\"\n    [ -f \"$SETTINGS\" ] && EXISTING=$(cat \"$SETTINGS\")\n\n    echo \"$EXISTING\" | jq '\n      . * {\n        \"mcpServers\": {\n          \"context7\": {\n            \"command\": \"npx\",\n            \"args\": [\"-y\", \"@upstash/context7-mcp\"]\n          },\n          \"exa\": {\n            \"command\": \"npx\",\n            \"args\": [\"-y\", \"exa-mcp-server\"],\n            \"env\": {\n              \"EXA_API_KEY\": \"\"\n            }\n          }\n        }\n      }\n    ' > \"$SETTINGS.tmp\" && mv \"$SETTINGS.tmp\" \"$SETTINGS\"\n  fi\n"
    },
    "profile": {
      "common": "  NODE_PREFIX=\"$FLOX_ENV_CACHE/node-global\"\n  export NPM_CONFIG_PREFIX=\"$NODE_PREFIX\"\n  export PATH=\"$NODE_PREFIX/bin:$FLOX_ENV_PROJECT/.venv/bin:$PATH\"\n\n  # Prefer Flox-managed claude over system\n  if [ -x \"$NODE_PREFIX/bin/claude\" ]; then\n    export FLOWSTATE_CLAUDE_BIN=\"$NODE_PREFIX/bin/claude\"\n  fi\n\n  echo \"\"\n  echo \"  ⚡ FlowState environment ready\"\n  echo \"  Python:     $(python3 --version 2>&1)\"\n  echo \"  Node:       $(node --version 2>&1)\"\n  echo \"  Claude CLI: $(claude --version 2>&1 || echo 'not found — run: npm install -g @anthropic-ai/claude-code')\"\n  echo \"  FlowState:  $(flowstate --version 2>&1 || echo 'not found')\"\n  echo \"\"\n  echo \"  Commands:\"\n  echo \"    flowstate init --dry-run   # test the pipeline\"\n  echo \"    flowstate init             # live GrandSlam\"\n  echo \"    flowstate status           # check tool state\"\n  echo \"    flowstate check            # verify claude bridge\"\n  echo \"\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    }
  },
